<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>藏经阁 - 校园二手教材&笔记共享平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", "SimSun", serif;
        }
        body {
            background: #fdf6e9;
            color: #3a2e22;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        /* 头部 */
        header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 2px solid #d2b48c;
            margin-bottom: 20px;
        }
        header h1 {
            font-size: 48px;
            color: #8b4513;
            letter-spacing: 10px;
            margin-bottom: 10px;
        }
        header p {
            font-size: 18px;
            color: #6d4c2b;
            letter-spacing: 2px;
        }
        /* 导航栏 */
        .nav {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        .nav-btn {
            background: #fffaf0;
            border: 2px solid #d2b48c;
            color: #8b4513;
            padding: 10px 25px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }
        .nav-btn:hover, .nav-btn.active {
            background: #8b5a2b;
            color: white;
            border-color: #8b5a2b;
        }
        /* 搜索栏 */
        .search-box {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        .search-box input {
            width: 300px;
            padding: 12px 15px;
            border: 2px solid #d2b48c;
            border-radius: 8px;
            background: #fffaf0;
            color: #3a2e22;
            font-size: 14px;
        }
        .search-box select, .search-box button {
            padding: 12px 15px;
            border: 2px solid #d2b48c;
            border-radius: 8px;
            background: #fffaf0;
            color: #3a2e22;
            cursor: pointer;
            transition: 0.3s;
        }
        .search-box button {
            background: #8b5a2b;
            color: white;
            border-color: #8b5a2b;
        }
        .search-box button:hover {
            background: #6d4425;
        }
        /* 内容区 */
        .content {
            display: none;
            margin: 30px 0;
        }
        .content.active {
            display: block;
        }
        /* 卡片样式 */
        .card-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin: 20px 0;
        }
        .card {
            background: #fffaf0;
            border: 2px solid #d2b48c;
            border-radius: 12px;
            padding: 20px;
            transition: 0.3s;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(139, 90, 43, 0.2);
        }
        .card .title {
            font-size: 18px;
            color: #8b4513;
            font-weight: bold;
            margin-bottom: 10px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .card .info {
            font-size: 14px;
            color: #6d4c2b;
            margin: 5px 0;
        }
        .card .price {
            font-size: 20px;
            color: #e63946;
            font-weight: bold;
            margin: 10px 0;
        }
        .card .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        .card-btn {
            flex: 1;
            padding: 8px 0;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }
        .btn-collect {
            background: #fffaf0;
            border: 1px solid #d2b48c;
            color: #8b4513;
        }
        .btn-want {
            background: #8b5a2b;
            color: white;
        }
        /* 发布/求书表单 */
        .form-box {
            max-width: 600px;
            margin: 0 auto;
            background: #fffaf0;
            border: 2px solid #d2b48c;
            border-radius: 12px;
            padding: 30px;
        }
        .form-box h3 {
            color: #8b4513;
            margin-bottom: 20px;
            text-align: center;
            font-size: 20px;
        }
        .form-item {
            margin: 15px 0;
        }
        .form-item label {
            display: block;
            font-size: 14px;
            color: #6d4c2b;
            margin-bottom: 5px;
        }
        .form-item input, .form-item select, .form-item textarea {
            width: 100%;
            padding: 10px 15px;
            border: 2px solid #d2b48c;
            border-radius: 8px;
            background: #fffdf5;
            color: #3a2e22;
            font-family: "Microsoft YaHei";
        }
        .form-item textarea {
            min-height: 100px;
            resize: none;
        }
        .submit-btn {
            width: 100%;
            padding: 12px 0;
            background: #8b5a2b;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        .submit-btn:hover {
            background: #6d4425;
        }
        /* 学霸推荐/求书墙 */
        .hot-area {
            border: 2px solid #8b4513;
            border-radius: 12px;
            padding: 20px;
            margin: 20px 0;
            background: #fff5e1;
        }
        .hot-area h3 {
            color: #8b4513;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .hot-area h3 i {
            font-style: normal;
            font-size: 20px;
        }
        /* 个人中心 */
        .user-info {
            text-align: center;
            margin-bottom: 30px;
            font-size: 16px;
            color: #6d4c2b;
        }
        .user-info input {
            padding: 8px 15px;
            border: 2px solid #d2b48c;
            border-radius: 8px;
            background: #fffaf0;
            margin: 0 5px;
        }
        .user-info button {
            padding: 8px 15px;
            background: #8b5a2b;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <header>
            <h1>藏 经 阁</h1>
            <p>校园二手教材 · 优质笔记共享 · 知识传承 · 绿色校园</p>
        </header>

        <!-- 导航栏 -->
        <div class="nav">
            <button class="nav-btn active" onclick="openTab('index')">首页</button>
            <button class="nav-btn" onclick="openTab('book')">二手教材</button>
            <button class="nav-btn" onclick="openTab('note')">学霸笔记</button>
            <button class="nav-btn" onclick="openTab('publish')">发布内容</button>
            <button class="nav-btn" onclick="openTab('want')">求书墙</button>
            <button class="nav-btn" onclick="openTab('my')">个人中心</button>
        </div>

        <!-- 搜索栏 -->
        <div class="search-box">
            <input type="text" id="search-input" placeholder="搜索教材/笔记名称/课程">
            <select id="search-type">
                <option value="all">全部</option>
                <option value="book">二手教材</option>
                <option value="note">学霸笔记</option>
            </select>
            <select id="search-price">
                <option value="all">价格不限</option>
                <option value="free">免费</option>
                <option value="low">0-50元</option>
                <option value="high">50元以上</option>
            </select>
            <button onclick="searchContent()">搜索</button>
        </div>

        <!-- 首页 -->
        <div class="content active" id="index">
            <!-- 学霸推荐 -->
            <div class="hot-area">
                <h3><i>🏆</i>学霸推荐（置顶）</h3>
                <div class="card-list" id="hot-list">
                    <!-- 自动加载推荐内容 -->
                </div>
            </div>
            <!-- 最新发布 -->
            <h3 style="color: #8b5a2b; margin: 20px 0;">最新发布</h3>
            <div class="card-list" id="index-list">
                <!-- 自动加载最新内容 -->
            </div>
        </div>

        <!-- 二手教材 -->
        <div class="content" id="book">
            <div class="card-list" id="book-list">
                <!-- 自动加载教材内容 -->
            </div>
        </div>

        <!-- 学霸笔记 -->
        <div class="content" id="note">
            <div class="card-list" id="note-list">
                <!-- 自动加载笔记内容 -->
            </div>
        </div>

        <!-- 发布内容 -->
        <div class="content" id="publish">
            <div class="form-box">
                <h3>发布二手教材/学霸笔记</h3>
                <div class="form-item">
                    <label>发布类型</label>
                    <select id="publish-type">
                        <option value="book">二手教材</option>
                        <option value="note">学霸笔记</option>
                    </select>
                </div>
                <div class="form-item">
                    <label>标题（教材名/笔记课程名）</label>
                    <input type="text" id="publish-title" placeholder="例：数据结构教材/高数上册学霸笔记">
                </div>
                <div class="form-item">
                    <label>详细信息</label>
                    <textarea id="publish-info" placeholder="例：教材-九成新/无笔迹/适用计科专业；笔记-手写扫描/含课后习题答案"></textarea>
                </div>
                <div class="form-item">
                    <label>价格（免费填0）</label>
                    <input type="number" id="publish-price" placeholder="0" min="0">
                </div>
                <div class="form-item">
                    <label>交易/获取方式</label>
                    <select id="publish-way">
                        <option value="self">校内自提</option>
                        <option value="express">快递到付</option>
                        <option value="online">线上发送（仅笔记）</option>
                    </select>
                </div>
                <div class="form-item">
                    <label>发布人（学号/昵称）</label>
                    <input type="text" id="publish-user" placeholder="例：2023001/小李">
                </div>
                <button class="submit-btn" onclick="publishContent()">确认发布</button>
            </div>
        </div>

        <!-- 求书墙 -->
        <div class="content" id="want">
            <div class="form-box">
                <h3>发布求书/求笔记需求</h3>
                <div class="form-item">
                    <label>需求类型</label>
                    <select id="want-type">
                        <option value="book">求教材</option>
                        <option value="note">求笔记</option>
                    </select>
                </div>
                <div class="form-item">
                    <label>需求名称</label>
                    <input type="text" id="want-title" placeholder="例：求数据结构二手教材/求大物实验笔记">
                </div>
                <div class="form-item">
                    <label>补充说明</label>
                    <textarea id="want-info" placeholder="例：接受八成新以上/可有偿/计科专业"></textarea>
                </div>
                <div class="form-item">
                    <label>联系人</label>
                    <input type="text" id="want-user" placeholder="例：2023001/小李">
                </div>
                <button class="submit-btn" onclick="publishWant()">发布需求</button>
            </div>
            <!-- 求书列表 -->
            <div class="hot-area" style="margin-top: 30px;">
                <h3><i>📢</i>最新求书需求</h3>
                <div class="card-list" id="want-list">
                    <!-- 自动加载求书内容 -->
                </div>
            </div>
        </div>

        <!-- 个人中心 -->
        <div class="content" id="my">
            <div class="user-info">
                <span>我的校园身份：</span>
                <input type="text" id="user-name" placeholder="输入学号/昵称" value="藏经阁用户">
                <button onclick="saveUser()">保存身份</button>
            </div>
            <h3 style="color: #8b5a2b; margin: 20px 0;">我的发布</h3>
            <div class="card-list" id="my-publish">
                <!-- 自动加载我的发布 -->
            </div>
            <h3 style="color: #8b5a2b; margin: 30px 0 20px 0;">我的收藏</h3>
            <div class="card-list" id="my-collect">
                <!-- 自动加载我的收藏 -->
            </div>
        </div>
    </div>

    <script>
        // 全局变量
        let userInfo = JSON.parse(localStorage.getItem('cangjingge_user')) || { name: '藏经阁用户' };
        let contentList = JSON.parse(localStorage.getItem('cangjingge_content')) || [];
        let wantList = JSON.parse(localStorage.getItem('cangjingge_want')) || [];
        let collectList = JSON.parse(localStorage.getItem('cangjingge_collect')) || [];

        // 页面切换
        function openTab(tabId) {
            document.querySelectorAll('.content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.target.classList.add('active');
            // 每次切换重新渲染数据
            renderAll();
        }

        // 保存用户身份
        function saveUser() {
            let name = document.getElementById('user-name').value;
            if (!name) {
                alert('请填写身份信息！');
                return;
            }
            userInfo.name = name;
            localStorage.setItem('cangjingge_user', JSON.stringify(userInfo));
            alert('身份保存成功！');
            renderAll();
        }

        // 发布内容（教材/笔记）
        function publishContent() {
            let type = document.getElementById('publish-type').value;
            let title = document.getElementById('publish-title').value;
            let info = document.getElementById('publish-info').value;
            let price = document.getElementById('publish-price').value;
            let way = document.getElementById('publish-way').value;
            let user = document.getElementById('publish-user').value;

            if (!title || !info || !price || !user) {
                alert('请填写完整发布信息！');
                return;
            }

            // 处理方式文字
            let wayText = way === 'self' ? '校内自提' : way === 'express' ? '快递到付' : '线上发送';
            // 处理类型文字
            let typeText = type === 'book' ? '二手教材' : '学霸笔记';
            // 新增内容
            let newContent = {
                id: Date.now(),
                type,
                typeText,
                title,
                info,
                price: Number(price),
                priceText: Number(price) === 0 ? '免费' : `¥${price}`,
                way,
                wayText,
                user,
                time: new Date().toLocaleString(),
                isHot: type === 'note' && Number(price) === 0 // 免费笔记设为学霸推荐
            };
            contentList.unshift(newContent);
            localStorage.setItem('cangjingge_content', JSON.stringify(contentList));
            alert('发布成功！');
            // 清空表单
            document.getElementById('publish-title').value = '';
            document.getElementById('publish-info').value = '';
            document.getElementById('publish-price').value = 0;
            document.getElementById('publish-user').value = userInfo.name;
            renderAll();
        }

        // 发布求书需求
        function publishWant() {
            let type = document.getElementById('want-type').value;
            let title = document.getElementById('want-title').value;
            let info = document.getElementById('want-info').value;
            let user = document.getElementById('want-user').value;

            if (!title || !info || !user) {
                alert('请填写完整需求信息！');
                return;
            }

            let typeText = type === 'book' ? '求教材' : '求笔记';
            let newWant = {
                id: Date.now(),
                type,
                typeText,
                title,
                info,
                user,
                time: new Date().toLocaleString()
            };
            wantList.unshift(newWant);
            localStorage.setItem('cangjingge_want', JSON.stringify(wantList));
            alert('需求发布成功！');
            // 清空表单
            document.getElementById('want-title').value = '';
            document.getElementById('want-info').value = '';
            document.getElementById('want-user').value = userInfo.name;
            renderAll();
        }

        // 收藏功能
        function collectContent(id) {
            let isCollected = collectList.some(item => item.id === id);
            if (isCollected) {
                collectList = collectList.filter(item => item.id !== id);
                alert('取消收藏！');
            } else {
                let content = contentList.find(item => item.id === id);
                if (content) {
                    collectList.push(content);
                    alert('收藏成功！');
                }
            }
            localStorage.setItem('cangjingge_collect', JSON.stringify(collectList));
            renderAll();
        }

        // 我想要
        function wantContent(id) {
            let content = contentList.find(item => item.id === id);
            if (content) {
                alert(`我想要！\n标题：${content.title}\n发布人：${content.user}\n方式：${content.wayText}\n请联系发布人对接！`);
            }
        }

        // 搜索功能
        function searchContent() {
            let keyword = document.getElementById('search-input').value.toLowerCase();
            let type = document.getElementById('search-type').value;
            let price = document.getElementById('search-price').value;

            let filterList = contentList.filter(item => {
                // 关键词筛选
                let hasKeyword = item.title.toLowerCase().includes(keyword) || item.info.toLowerCase().includes(keyword);
                // 类型筛选
                let hasType = type === 'all' || item.type === type;
                // 价格筛选
                let hasPrice = true;
                if (price === 'free') hasPrice = item.price === 0;
                if (price === 'low') hasPrice = item.price > 0 && item.price <= 50;
                if (price === 'high') hasPrice = item.price > 50;

                return hasKeyword && hasType && hasPrice;
            });

            // 渲染搜索结果到首页
            document.getElementById('index-list').innerHTML = renderCard(filterList);
            // 切换到首页
            openTab('index');
        }

        // 渲染卡片
        function renderCard(list) {
            if (list.length === 0) {
                return `<div style="text-align: center; color: #6d4c2b; padding: 50px 0;">暂无内容，快来发布吧！</div>`;
            }
            return list.map(item => `
                <div class="card">
                    <div class="title">${item.title}</div>
                    <div class="info">${item.typeText}</div>
                    <div class="info">${item.info}</div>
                    <div class="info">发布人：${item.user}</div>
                    <div class="info">发布时间：${item.time}</div>
                    <div class="info">获取方式：${item.wayText}</div>
                    <div class="price">${item.priceText}</div>
                    <div class="btn-group">
                        <button class="card-btn btn-collect" onclick="collectContent(${item.id})">
                            ${collectList.some(c => c.id === item.id) ? '取消收藏' : '收藏'}
                        </button>
                        <button class="card-btn btn-want" onclick="wantContent(${item.id})">我想要</button>
                    </div>
                </div>
            `).join('');
        }

        // 渲染求书卡片
        function renderWantCard(list) {
            if (list.length === 0) {
                return `<div style="text-align: center; color: #6d4c2b; padding: 50px 0;">暂无求书需求，快来发布吧！</div>`;
            }
            return list.map(item => `
                <div class="card">
                    <div class="title">${item.title}</div>
                    <div class="info">${item.typeText}</div>
                    <div class="info">${item.info}</div>
                    <div class="info">需求人：${item.user}</div>
                    <div class="info">发布时间：${item.time}</div>
                </div>
            `).join('');
        }

        // 渲染所有数据
        function renderAll() {
            // 初始化发布人输入框为当前用户
            document.getElementById('publish-user').value = userInfo.name;
            document.getElementById('want-user').value = userInfo.name;
            document.getElementById('user-name').value = userInfo.name;

            // 学霸推荐（免费笔记）
            let hotList = contentList.filter(item => item.isHot);
            document.getElementById('hot-list').innerHTML = renderCard(hotList);

            // 首页最新发布
            document.getElementById('index-list').innerHTML = renderCard(contentList);

            // 二手教材
            let bookList = contentList.filter(item => item.type === 'book');
            document.getElementById('book-list').innerHTML = renderCard(bookList);

            // 学霸笔记
            let noteList = contentList.filter(item => item.type === 'note');
            document.getElementById('note-list').innerHTML = renderCard(noteList);

            // 求书墙
            document.getElementById('want-list').innerHTML = renderWantCard(wantList);

            // 个人中心-我的发布
            let myPublish = contentList.filter(item => item.user === userInfo.name);
            document.getElementById('my-publish').innerHTML = renderCard(myPublish);

            // 个人中心-我的收藏
            document.getElementById('my-collect').innerHTML = renderCard(collectList);
        }

        // 页面加载时渲染
        window.onload = function() {
            renderAll();
        };
    </script>
</body>
</html>
